spring.main.allow-bean-definition-overriding=true


#-------------------------------     Translation Management System    -------------------------------
jsf.primefaces.theme=redmond

server.port=8081
server.context-path=/tms


#-------------------------------            H2             ------------------------------------

spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# in-memory mode
#spring.datasource.url=jdbc:h2:mem:testdb
# storage into file
spring.datasource.url=jdbc:h2:file:./data/tmsdb
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# `update` - spring will update the database according to entities from model.
# `none`   - nothing will happen. use this option in combination with Liquibase.